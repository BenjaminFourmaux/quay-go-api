definitions:
  Dto.Avatar:
    properties:
      color:
        description: hex color code
        type: string
      hash:
        type: string
      kind:
        description: e.g., "user", "org"
        type: string
      name:
        type: string
    type: object
  Dto.CreateMessage:
    properties:
      content:
        type: string
      severity:
        type: string
    type: object
  Dto.CreateOrganization:
    properties:
      name:
        type: string
    type: object
  Dto.CreateRepository:
    properties:
      description:
        type: string
      is_public:
        type: boolean
      kind:
        type: string
      name:
        type: string
      namespace:
        description: Can be null if is a global repo, not organization scoped
        type: string
    type: object
  Dto.CreateTeam:
    properties:
      description:
        description: Description of the Team can be in Markdown format (optional)
        type: string
      name:
        type: string
      role:
        description: Name of the role ('admin', 'creator' or 'member'. Optional. Default
          'member')
        type: string
    type: object
  Dto.Message:
    properties:
      content:
        type: string
      media_type:
        type: string
      severity:
        type: string
      uuid:
        type: string
    type: object
  Dto.Organization:
    properties:
      avatar:
        $ref: '#/definitions/Dto.Avatar'
      invoice_email:
        type: boolean
      invoice_email_address:
        type: string
      is_admin:
        type: boolean
      is_free_account:
        type: boolean
      is_member:
        type: boolean
      name:
        type: string
      tag_expiration_s:
        type: integer
      teams:
        items:
          $ref: '#/definitions/Dto.Team'
        type: array
    type: object
  Dto.OrganizationMember:
    properties:
      avatar:
        $ref: '#/definitions/Dto.Avatar'
      kind:
        type: string
      name:
        type: string
      repositories:
        description: List of member's repository name
        items:
          type: string
        type: array
      teams:
        description: List of member's team name
        items:
          type: string
        type: array
    type: object
  Dto.Repository:
    properties:
      description:
        type: string
      is_public:
        type: boolean
      is_starred:
        type: boolean
      kind:
        description: Image or Application
        type: string
      name:
        description: Image name
        type: string
      namespace:
        type: string
      state:
        type: string
    type: object
  Dto.RepositoryDetails:
    properties:
      can_admin:
        type: boolean
      can_write:
        type: boolean
      description:
        type: string
      is_organization:
        type: boolean
      is_public:
        type: boolean
      is_starred:
        type: boolean
      kind:
        type: string
      name:
        type: string
      namespace:
        type: string
      state:
        type: string
      stats:
        items:
          $ref: '#/definitions/Dto.RepositoryStats'
        type: array
      status_token:
        type: string
      tag_expiration_s:
        type: integer
      tags:
        items:
          $ref: '#/definitions/Dto.RepositoryTag'
        type: array
      trust_enabled:
        type: boolean
    type: object
  Dto.RepositoryStats:
    properties:
      count:
        type: integer
      date:
        description: 'In format: yyyy-mm-dd'
        type: string
    type: object
  Dto.RepositoryTag:
    properties:
      last_modified:
        type: string
      manifest_digest:
        type: string
      name:
        type: string
      size:
        description: In bits
        type: integer
    type: object
  Dto.Team:
    properties:
      avatar:
        $ref: '#/definitions/Dto.Avatar'
      can_view:
        type: boolean
      description:
        type: string
      is_synced:
        type: boolean
      members_count:
        description: RepoCount    int    `json:"repo_count"` // Useless?
        type: integer
      name:
        type: string
      role:
        type: string
    type: object
  Dto.TeamMember:
    properties:
      avatar:
        $ref: '#/definitions/Dto.Avatar'
      invited:
        type: boolean
      is_robot:
        type: boolean
      kind:
        type: string
      name:
        type: string
    type: object
  Dto.UpdateMessage:
    properties:
      content:
        type: string
      severity:
        type: string
    type: object
  Dto.UpdateOrganization:
    properties:
      email:
        type: string
      invoice_email:
        type: boolean
      invoice_email_address:
        type: string
      tag_expiration_s:
        type: integer
    type: object
  Dto.UpdateRepository:
    properties:
      description:
        type: string
    type: object
  Dto.UpdateTeam:
    properties:
      description:
        type: string
      role:
        type: string
    type: object
  Dto.UserLogin:
    properties:
      metadata: {}
      service:
        type: string
      service_identifier:
        type: string
    type: object
  Dto.UserMeResponse:
    properties:
      anonymous:
        type: boolean
      avatar:
        $ref: '#/definitions/Dto.Avatar'
      can_create_repo:
        type: boolean
      company:
        type: string
      email:
        type: string
      family_name:
        type: string
      given_name:
        type: string
      has_password_set:
        type: boolean
      invoice_email:
        type: boolean
      invoice_email_address:
        type: string
      is_free_account:
        type: boolean
      is_me:
        type: boolean
      location:
        type: string
      logins:
        items:
          $ref: '#/definitions/Dto.UserLogin'
        type: array
      organizations:
        items:
          $ref: '#/definitions/Dto.UserOrganization'
        type: array
      preferred_namespace:
        type: boolean
      prompts:
        description: AI feature in coming ??
        items:
          type: string
        type: array
      super_user:
        type: boolean
      tag_expiration_s:
        type: integer
      username:
        type: string
      verified:
        type: boolean
    type: object
  Dto.UserOrganization:
    properties:
      avatar:
        $ref: '#/definitions/Dto.Avatar'
      can_create_repo:
        type: boolean
      is_org_admin:
        type: boolean
      name:
        type: string
      preferred_namespace:
        type: boolean
      public:
        type: boolean
    type: object
  Errors.ErrorDetails:
    properties:
      code:
        description: Code is a sting that represents the error code (e.g. "USER_NOT_FOUND",
          "INVALID_INPUT", etc.)
        type: string
      message:
        type: string
    type: object
  Errors.ErrorResponse:
    properties:
      error:
        $ref: '#/definitions/Errors.ErrorDetails'
    type: object
info:
  contact: {}
  description: Quay registry API implemented in Go
  title: Quay Go API
  version: "1.0"
paths:
  /api/v1/messages:
    get:
      description: List messages displayed on the quay web app for all user
      parameters:
      - description: 'Filter message by severity (comma separated, accepted values:
          info, warning, error)'
        in: query
        name: severity
        type: string
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/Dto.Message'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: List messages displayed on the quay web app for all user
      tags:
      - Messages
    post:
      consumes:
      - application/json
      description: Create a new message to displayed on the quay web app for all user
      parameters:
      - description: Message content and severity
        in: body
        name: message
        required: true
        schema:
          $ref: '#/definitions/Dto.CreateMessage'
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/Dto.Message'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Create a new message to displayed on the quay web app for all user
      tags:
      - Messages
  /api/v1/messages/{uuid}:
    delete:
      description: Delete a message
      parameters:
      - description: UUID of the message to update
        in: path
        name: uuid
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Delete a message
      tags:
      - Messages
    patch:
      consumes:
      - application/json
      description: Update the content or the severity of an existing message displayed
        on the quay web app for all user
      parameters:
      - description: UUID of the message to update
        in: path
        name: uuid
        required: true
        type: string
      - description: Message content and severity
        in: body
        name: message
        required: true
        schema:
          $ref: '#/definitions/Dto.UpdateMessage'
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/Dto.Message'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Update the content or the severity of an existing message displayed
        on the quay web app for all user
      tags:
      - Messages
  /api/v1/organization:
    get:
      description: List user's organizations
      parameters:
      - description: Filter organizations by public or private (true/false)
        in: query
        name: is_public
        type: string
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/Dto.UserOrganization'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: List user's organizations
      tags:
      - Organization
    post:
      consumes:
      - application/json
      description: Create a new organization
      parameters:
      - description: Organization metadata
        in: body
        name: message
        required: true
        schema:
          $ref: '#/definitions/Dto.CreateOrganization'
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/Dto.Organization'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Create a new organization
      tags:
      - Organization
  /api/v1/organization/{orgname}:
    delete:
      description: Delete an organization
      parameters:
      - description: Name of the organization
        in: path
        name: orgname
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Delete an organization
      tags:
      - Organization
    get:
      description: Get details in an organization
      parameters:
      - description: Name of the organization
        in: path
        name: orgname
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/Dto.Organization'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get details in an organization
      tags:
      - Organization
    patch:
      consumes:
      - application/json
      description: Update organization details
      parameters:
      - description: Name of the organization
        in: path
        name: orgname
        required: true
        type: string
      - description: Organization details to change
        in: body
        name: message
        required: true
        schema:
          $ref: '#/definitions/Dto.UpdateOrganization'
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/Dto.Organization'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Update organization details
      tags:
      - Organization
  /api/v1/organization/{orgname}/members:
    get:
      description: List organization's members
      parameters:
      - description: Name of the organization
        in: path
        name: orgname
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/Dto.OrganizationMember'
            type: array
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: List organization's members
      tags:
      - Organization
  /api/v1/organization/{orgname}/team:
    get:
      description: List organization's teams with optional filtering
      parameters:
      - description: Name of the organization
        in: path
        name: orgname
        required: true
        type: string
      - description: Filter teams by role name (e.g., 'admin', 'creator', 'member')
        in: query
        name: role
        type: string
      - description: Filter teams by name
        in: query
        name: name
        type: string
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/Dto.Team'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: List organization's teams
      tags:
      - Team
    post:
      consumes:
      - application/json
      description: Create a team inside the organization
      parameters:
      - description: Name of the organization
        in: path
        name: orgname
        required: true
        type: string
      - description: Team to create
        in: body
        name: message
        required: true
        schema:
          $ref: '#/definitions/Dto.CreateTeam'
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/Dto.Team'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Create a team inside the organization
      tags:
      - Team
  /api/v1/organization/{orgname}/team/{teamname}:
    delete:
      description: Delete a team
      parameters:
      - description: Name of the organization
        in: path
        name: orgname
        required: true
        type: string
      - description: Name of the team to delete
        in: path
        name: teamname
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Delete a team
      tags:
      - Team
    get:
      description: Get a team details
      parameters:
      - description: Name of the organization
        in: path
        name: orgname
        required: true
        type: string
      - description: Name of the team
        in: path
        name: teamname
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/Dto.Team'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get a team details
      tags:
      - Team
    patch:
      consumes:
      - application/json
      description: Update team details
      parameters:
      - description: Organization name
        in: path
        name: orgname
        required: true
        type: string
      - description: Team name to update
        in: path
        name: teamname
        required: true
        type: string
      - description: Team description and role to update
        in: body
        name: team
        required: true
        schema:
          $ref: '#/definitions/Dto.UpdateTeam'
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/Dto.Team'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Update team details
      tags:
      - Team
  /api/v1/organization/{orgname}/team/{teamname}/members:
    get:
      description: List team's members
      parameters:
      - description: Name of the organization
        in: path
        name: orgname
        required: true
        type: string
      - description: Name of the team
        in: path
        name: teamname
        required: true
        type: string
      - description: Filter team members on is_robot
        in: query
        name: is_robot
        type: boolean
      - description: Filter team members on invited status
        in: query
        name: is_invited
        type: boolean
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/Dto.TeamMember'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: List team's members
      tags:
      - Members
  /api/v1/organization/{orgname}/team/{teamname}/members/{membername}:
    delete:
      description: Remove a user from a team
      parameters:
      - description: Name of the organization
        in: path
        name: orgname
        required: true
        type: string
      - description: Name of the team
        in: path
        name: teamname
        required: true
        type: string
      - description: Name of the user
        in: path
        name: membername
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Remove a user from a team
      tags:
      - Members
    put:
      description: Add a user to a team
      parameters:
      - description: Name of the organization
        in: path
        name: orgname
        required: true
        type: string
      - description: Name of the team
        in: path
        name: teamname
        required: true
        type: string
      - description: Name of the user
        in: path
        name: membername
        required: true
        type: string
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/Dto.TeamMember'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Add a user to a team
      tags:
      - Members
  /api/v1/repository:
    get:
      description: List repositories
      parameters:
      - description: Organization or Username as namespace to filter repositories
        in: query
        name: namespace
        type: string
      - description: Filter on public repositories
        in: query
        name: is_public
        type: boolean
      - description: Filter on stared repositories
        in: query
        name: is_starred
        type: boolean
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/Dto.Repository'
            type: array
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: List repositories
      tags:
      - Repository
    post:
      consumes:
      - application/json
      description: Create a repository
      parameters:
      - description: Repository metadata
        in: body
        name: message
        required: true
        schema:
          $ref: '#/definitions/Dto.CreateRepository'
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/Dto.Repository'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Create a repository
      tags:
      - Repository
  /api/v1/repository/{repository}:
    delete:
      consumes:
      - application/json
      description: Delete a repository
      parameters:
      - description: Name of the repository
        in: path
        name: repository
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Delete a repository
      tags:
      - Repository
    get:
      description: Get a repository
      parameters:
      - description: Repository name in the format namespace/repository
        in: path
        name: repository
        required: true
        type: string
      - description: Include tags in the repository response
        in: query
        name: include_tags
        type: boolean
      - description: Include statistics in the repository response
        in: query
        name: include_stats
        type: boolean
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/Dto.RepositoryDetails'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/Errors.ErrorResponse'
      security:
      - ApiKeyAuth: []
      summary: Get a repository
      tags:
      - Repository
    patch:
      consumes:
      - application/json
      description: Update repository details
      parameters:
      - description: Name of the repository
        in: path
        name: repository
        required: true
        type: string
      - description: Repository details to change
        in: body
        name: message
        required: true
        schema:
